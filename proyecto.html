<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto — Daniel Serra Font</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── Full-page project detail: dark header + light body ── */
    :root {
      --proj-accent: #c8a96e;
      --proj-gA: #1c1a14;
      --proj-gB: #2e2a1c;
    }

    /* Hero */
    .proj-hero {
      width: 100%;
      aspect-ratio: 21/8;
      min-height: 300px;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 2.5rem 3rem;
      overflow: hidden;
      background: linear-gradient(145deg, var(--proj-gA), var(--proj-gB));
    }

    .proj-hero-watermark {
      position: absolute;
      right: 2.5rem; top: 50%;
      transform: translateY(-50%);
      font-family: var(--serif);
      font-size: clamp(6rem, 14vw, 12rem);
      font-weight: 300;
      color: rgba(240,237,232,0.04);
      letter-spacing: -0.04em;
      user-select: none;
      line-height: 1;
      pointer-events: none;
    }

    .proj-hero-content { position: relative; z-index: 2; max-width: 700px; }

    .proj-hero-tag {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .proj-hero-tag::before {
      content: '';
      display: inline-block;
      width: 20px; height: 1px;
      background: currentColor;
    }

    .proj-hero h1 {
      font-family: var(--serif);
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 400;
      line-height: 1.12;
      color: #f0ede8;
      margin-bottom: 0.4rem;
    }

    .proj-hero-sub {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.1rem;
      font-weight: 300;
      color: rgba(240,237,232,0.45);
    }

    .proj-hero-fade {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(13,16,20,0.85) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Carousel controls */
    .hero-counter {
      position: absolute;
      top: 1rem; right: 1.25rem; z-index: 10;
      font-family: var(--mono); font-size: 0.55rem;
      letter-spacing: 0.07em; color: rgba(240,237,232,0.3);
      background: rgba(0,0,0,0.3); padding: 0.2rem 0.55rem; border-radius: 2px;
    }
    .hero-dots {
      position: absolute; bottom: 1.5rem; right: 3rem; z-index: 10;
      display: flex; gap: 0.4rem;
    }
    .hero-dot {
      height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.25); cursor: pointer;
      transition: all 0.22s;
    }
    .hero-dot.active { background: var(--proj-accent); }
    .hero-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      z-index: 10; width: 38px; height: 38px; border-radius: 50%;
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(240,237,232,0.7); cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .hero-arrow:hover { background: rgba(0,0,0,0.65); color: #f0ede8; }
    .hero-arrow.left { left: 1.5rem; }
    .hero-arrow.right { right: 1.5rem; }

    /* Back button */
    .back-btn {
      position: absolute; top: 1.1rem; left: 1.25rem; z-index: 20;
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-family: var(--mono); font-size: 0.6rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(240,237,232,0.6);
      background: rgba(11,13,15,0.65); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 2px;
      padding: 0.5rem 0.9rem; cursor: pointer;
      text-decoration: none; transition: all 0.2s;
    }
    .back-btn:hover { color: #f0ede8; background: rgba(11,13,15,0.85); border-color: rgba(255,255,255,0.2); }

    /* ── CONTENT ── */
    .proj-content {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 2.5rem 6rem;
    }

    /* Meta strip */
    .proj-meta-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }
    .proj-meta-item { display: flex; flex-direction: column; gap: 0.25rem; }
    .proj-meta-lbl {
      font-family: var(--mono); font-size: 0.55rem;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3);
    }
    .proj-meta-val { font-size: 0.9rem; color: var(--text-2); line-height: 1.4; }
    .proj-meta-val.accent { color: var(--proj-accent); }

    /* Description */
    .proj-desc-block { max-width: 720px; margin-bottom: 3rem; }
    .proj-desc-block p {
      font-size: 0.96rem;
      line-height: 1.82;
      color: var(--text-2);
      margin-bottom: 1.25rem;
    }

    /* Tasks columns */
    .proj-tasks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      margin-bottom: 3rem;
      padding-top: 2.5rem;
      border-top: 1px solid var(--border);
    }
    .task-col-title {
      font-family: var(--mono); font-size: 0.6rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 1.1rem;
      display: flex; align-items: center; gap: 0.55rem;
    }
    .task-col-title::before {
      content: ''; display: inline-block;
      width: 14px; height: 1px; background: currentColor;
    }
    .proj-task-item {
      display: flex; gap: 0.8rem;
      margin-bottom: 0.7rem;
      font-size: 0.875rem; color: var(--text-2); line-height: 1.62;
    }
    .proj-task-dot {
      width: 5px; height: 5px; border-radius: 50%;
      flex-shrink: 0; margin-top: 0.55em;
    }

    /* Press links */
    .proj-press { margin-bottom: 3rem; }
    .press-section-title {
      font-family: var(--mono); font-size: 0.6rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 1rem;
      padding-bottom: 0.65rem; border-bottom: 1px solid var(--border);
    }
    .press-link-row {
      display: flex; align-items: flex-start; gap: 1.25rem;
      padding: 1rem 0; border-bottom: 1px solid var(--border);
      text-decoration: none; color: inherit;
      transition: all 0.2s;
    }
    .press-link-row:hover { padding-left: 0.5rem; }
    .press-link-date {
      font-family: var(--mono); font-size: 0.58rem;
      letter-spacing: 0.06em; color: var(--text-3);
      min-width: 65px; padding-top: 0.2rem;
      flex-shrink: 0;
    }
    .press-link-body { flex: 1; }
    .press-link-source {
      font-family: var(--mono); font-size: 0.58rem;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-2); margin-bottom: 0.2rem;
    }
    .press-link-title {
      font-family: var(--serif); font-size: 1.05rem;
      font-weight: 400; line-height: 1.3; color: var(--text);
    }
    .press-link-row:hover .press-link-title { text-decoration: underline; text-decoration-color: var(--border); }
    .press-link-arrow { color: var(--text-3); flex-shrink: 0; transition: transform 0.2s; }
    .press-link-row:hover .press-link-arrow { color: var(--text); transform: translate(2px,-2px); }

    /* Footer actions */
    .proj-footer-actions {
      display: flex; gap: 1rem;
      padding-top: 2.5rem; border-top: 1px solid var(--border);
    }
    .btn-back-lg {
      display: inline-flex; align-items: center; gap: 0.55rem;
      font-family: var(--mono); font-size: 0.62rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-2); background: transparent;
      border: 1px solid var(--border); border-radius: 2px;
      padding: 0.85rem 1.5rem; cursor: pointer;
      text-decoration: none; transition: all 0.2s;
    }
    .btn-back-lg:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .btn-ext-lg {
      display: inline-flex; align-items: center; gap: 0.55rem;
      font-family: var(--mono); font-size: 0.62rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      border-radius: 2px; padding: 0.85rem 1.75rem;
      text-decoration: none; font-weight: 500;
      transition: opacity 0.2s;
    }
    .btn-ext-lg:hover { opacity: 0.85; }

    /* Nav override for light pages */
    .nav { background: var(--bg); border-bottom: 1px solid var(--border); }

    @media (max-width: 900px) {
      .proj-meta-strip { grid-template-columns: 1fr 1fr; }
      .proj-tasks { grid-template-columns: 1fr; gap: 2rem; }
      .proj-hero { aspect-ratio: 16/9; padding: 1.75rem; }
      .proj-content { padding: 2rem 1.25rem 4rem; }
    }
  </style>
</head>
<body>

  <!-- ── NAV ── -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">Daniel Serra <span>Font</span></a>
    <div class="nav-links">
      <a href="index.html"         class="active" data-i18n="nav_projects">Proyectos</a>
      <a href="sobre-mi.html"      data-i18n="nav_about">Sobre mí</a>
      <a href="servicios.html"     data-i18n="nav_services">Servicios</a>
      <a href="publicaciones.html" data-i18n="nav_publications">Publicaciones</a>
      <a href="premios.html"       data-i18n="nav_awards">Reconocimientos</a>
      <a href="blog.html"          data-i18n="nav_blog">Blog</a>
      <a href="contacto.html"      data-i18n="nav_contact">Contacto</a>
    </div>
    <div class="nav-right">
      <button class="lang-toggle" id="lang-toggle">EN</button>
    </div>
  </nav>

  <div class="page-content" style="padding-top: 0;">

    <!-- ── HERO ── -->
    <div class="proj-hero" id="proj-hero">
      <a href="index.html" class="back-btn">← Volver al mapa</a>
      <div class="proj-hero-watermark" id="hero-watermark"></div>
      <div class="proj-hero-fade"></div>
      <span class="hero-counter" id="hero-counter"></span>
      <button class="hero-arrow left" id="hero-prev">‹</button>
      <button class="hero-arrow right" id="hero-next">›</button>
      <div class="hero-dots" id="hero-dots"></div>
      <div class="proj-hero-content">
        <div class="proj-hero-tag" id="hero-tag"></div>
        <h1 id="hero-title"></h1>
        <div class="proj-hero-sub" id="hero-sub"></div>
      </div>
    </div>

    <!-- ── CONTENT ── -->
    <main class="proj-content">

      <!-- Meta strip -->
      <div class="proj-meta-strip" id="proj-meta"></div>

      <!-- Description -->
      <div class="proj-desc-block" id="proj-desc"></div>

      <!-- Tasks -->
      <div class="proj-tasks" id="proj-tasks"></div>

      <!-- Press -->
      <div class="proj-press" id="proj-press"></div>

      <!-- Footer actions -->
      <div class="proj-footer-actions" id="proj-actions"></div>

    </main>

    <footer>
      <span class="foot-name">Daniel Serra Font</span>
      <span class="foot-meta">Arquitecto · Urbanista · Director de Velat Studio</span>
      <div class="foot-links">
        <a href="https://www.velatstudio.com" target="_blank" rel="noopener">Velat Studio ↗</a>
        <a href="contacto.html">Contacto</a>
        <a href="index.html">← Mapa</a>
      </div>
    </footer>
  </div>

  <script src="js/main.js"></script>
  <script>
    /* ── READ ID FROM URL ── */
    const params = new URLSearchParams(location.search);
    const pid = params.get('id');
    const proj = PROJECTS.find(p => p.id === pid);

    if (!proj) {
      document.title = 'Proyecto no encontrado';
      document.querySelector('.proj-hero').innerHTML = '<a href="index.html" class="back-btn">← Volver al mapa</a><div style="padding:4rem;font-family:var(--mono);color:rgba(240,237,232,0.3)">Proyecto no encontrado</div>';
    } else {
      let carouselIdx = 0;
      const lang = () => currentLang;

      /* ── APPLY CSS VARS ── */
      document.documentElement.style.setProperty('--proj-accent', proj.accent);
      document.documentElement.style.setProperty('--proj-gA', proj.gradA);
      document.documentElement.style.setProperty('--proj-gB', proj.gradB);

      /* ── UPDATE META TITLE ── */
      document.title = `${proj.name_es} — Daniel Serra Font`;

      /* ── RENDER HERO ── */
      function renderHero() {
        document.getElementById('hero-watermark').textContent = proj.abbr;
        document.getElementById('hero-counter').textContent = `0${carouselIdx+1} / 0${proj.images}`;

        const tagEl = document.getElementById('hero-tag');
        tagEl.textContent = lang()==='es' ? proj.tag_es : proj.tag_en;
        tagEl.style.color = proj.accent;

        document.getElementById('hero-title').textContent = lang()==='es' ? proj.name_es : proj.name_en;
        document.getElementById('hero-sub').textContent = lang()==='es' ? proj.subtitle_es : proj.subtitle_en;

        /* Image: use real file if exists, else gradient background stays */
        const imgPath = `assets/img/${proj.id}-${carouselIdx+1}.jpg`;
        const hero = document.getElementById('proj-hero');
        const img = new Image();
        img.onload = () => { hero.style.backgroundImage = `url(${imgPath})`; hero.style.backgroundSize = 'cover'; hero.style.backgroundPosition = 'center'; };
        img.onerror = () => { hero.style.backgroundImage = ''; };
        img.src = imgPath;

        /* Dots */
        const dotsEl = document.getElementById('hero-dots');
        dotsEl.innerHTML = '';
        for (let i = 0; i < proj.images; i++) {
          const d = document.createElement('div');
          d.className = 'hero-dot' + (i === carouselIdx ? ' active' : '');
          d.style.width = i === carouselIdx ? '22px' : '7px';
          d.addEventListener('click', () => { carouselIdx = i; renderHero(); });
          dotsEl.appendChild(d);
        }
      }
      renderHero();

      document.getElementById('hero-prev').addEventListener('click', () => { carouselIdx = (carouselIdx-1+proj.images)%proj.images; renderHero(); });
      document.getElementById('hero-next').addEventListener('click', () => { carouselIdx = (carouselIdx+1)%proj.images; renderHero(); });

      /* ── RENDER CONTENT ── */
      function renderContent() {
        const l = lang();

        /* Meta */
        document.getElementById('proj-meta').innerHTML = `
          <div class="proj-meta-item">
            <div class="proj-meta-lbl">Año</div>
            <div class="proj-meta-val">${proj.year}</div>
          </div>
          <div class="proj-meta-item">
            <div class="proj-meta-lbl">Cliente</div>
            <div class="proj-meta-val">${l==='es'?proj.client_es:proj.client_en}</div>
          </div>
          <div class="proj-meta-item">
            <div class="proj-meta-lbl">Rol</div>
            <div class="proj-meta-val">${l==='es'?proj.role_es:proj.role_en}</div>
          </div>
          <div class="proj-meta-item">
            <div class="proj-meta-lbl">Territorio</div>
            <div class="proj-meta-val accent">${l==='es'?proj.area_es:proj.area_en}</div>
          </div>`;

        /* Description */
        const desc = l==='es' ? proj.desc_es : proj.desc_en;
        document.getElementById('proj-desc').innerHTML = desc.split('\n\n')
          .map(para => `<p>${para}</p>`).join('');

        /* Tasks */
        const led = l==='es' ? proj.led_es : proj.led_en;
        const part = l==='es' ? proj.part_es : proj.part_en;
        const ledTitle = l==='es' ? 'Tareas lideradas' : 'Tasks led';
        const partTitle = l==='es' ? 'Participación' : 'Participation';

        document.getElementById('proj-tasks').innerHTML = `
          <div>
            <div class="task-col-title" style="color:${proj.accent}">${ledTitle}</div>
            ${led.map(t => `
              <div class="proj-task-item">
                <div class="proj-task-dot" style="background:${proj.accent}"></div>
                <span>${t}</span>
              </div>`).join('')}
          </div>
          <div>
            <div class="task-col-title" style="color:var(--text-3)">${partTitle}</div>
            ${part.map(t => `
              <div class="proj-task-item">
                <div class="proj-task-dot" style="background:var(--border)"></div>
                <span>${t}</span>
              </div>`).join('')}
          </div>`;

        /* Press */
        const pressEl = document.getElementById('proj-press');
        if (proj.press && proj.press.length > 0) {
          pressEl.innerHTML = `
            <div class="press-section-title">${l==='es'?'Cobertura mediática':'Press coverage'}</div>
            ${proj.press.map(art => `
              <a href="${art.url}" target="_blank" rel="noopener" class="press-link-row">
                <div class="press-link-date">${art.date}</div>
                <div class="press-link-body">
                  <div class="press-link-source">${art.source}</div>
                  <div class="press-link-title">${art.title}</div>
                </div>
                <div class="press-link-arrow">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
                </div>
              </a>`).join('')}`;
        } else {
          pressEl.innerHTML = '';
        }

        /* Footer actions */
        const backTxt = l==='es' ? '← Volver al mapa' : '← Back to map';
        const extTxt = l==='es' ? 'Ver fuente oficial ↗' : 'View official source ↗';
        document.getElementById('proj-actions').innerHTML = `
          <a href="index.html" class="btn-back-lg">${backTxt}</a>
          ${proj.link ? `<a href="${proj.link}" target="_blank" rel="noopener" class="btn-ext-lg" style="background:${proj.accent};color:#0b0d0f">${extTxt}</a>` : ''}`;
      }
      renderContent();

      /* Re-render on lang toggle */
      document.getElementById('lang-toggle').addEventListener('click', () => {
        setTimeout(() => { renderHero(); renderContent(); }, 10);
      });
    }
  </script>
</body>
</html>
