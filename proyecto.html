<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto — Daniel Serra Font</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="nav-root" data-active="index"></div>

  <aside class="sidebar">
    <div class="sb-identity">
      <div class="sb-big-num">01</div>
      <div class="sb-name" data-i18n-html="sb_name_index"><em>Proyectos</em></div>
      <div class="sb-rule"></div>
      <div class="sb-role" data-i18n="sb_role">Planeamiento General · Planes Parciales<br>Consultoría Territorial</div>
      <div class="sb-desc" data-i18n="sb_desc">Proyectos de urbanismo y ordenación territorial.</div>
    </div>
    <div class="sidebar-list-header">
      <span class="sidebar-list-label" data-i18n="nav_projects">Proyectos</span>
      <span class="sidebar-list-count" id="proj-count"></span>
    </div>
    <div class="project-list" id="project-list"></div>
  </aside>

  <div class="lightbox" id="lightbox">
    <img id="lightbox-img" src="" alt="Vista ampliada">
  </div>

  <div class="main-wrap">
    <div style="padding-top: 0;">
      
      <div class="proj-hero zoomable" id="proj-hero">
        <a href="index.html" class="back-btn" id="btn-back-hero" style="z-index: 20;">← Volver al mapa</a>
        <span class="hero-counter" id="hero-counter"></span>
        <button class="hero-arrow left" id="hero-prev">‹</button>
        <button class="hero-arrow right" id="hero-next">›</button>
        <div class="hero-dots" id="hero-dots"></div>
      </div>

      <main class="proj-content">
        <div style="margin-bottom: 3rem;">
          <div class="proj-hero-tag" id="hero-tag"></div>
          <h1 id="hero-title" style="font-family: var(--serif); font-size: 2.8rem; font-weight: 400; line-height: 1.1; color: var(--text); margin-bottom: 0.4rem;"></h1>
          <div class="proj-hero-sub" id="hero-sub" style="font-family: var(--serif); font-style: italic; font-size: 1.1rem; color: var(--text-2);"></div>
        </div>

        <div class="proj-meta-strip" id="proj-meta"></div>
        <div class="proj-desc-block" id="proj-desc"></div>
        <div class="proj-tasks" id="proj-tasks"></div>
        <div class="proj-press" id="proj-press"></div>
        <div class="proj-footer-actions" id="proj-actions"></div>
      </main>

    </div>
  </div>

  <div id="footer-root"></div>

  <script src="js/main.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const pid = params.get('id');
    const proj = PROJECTS.find(p => p.id === pid);

    function buildList() {
      const list = document.getElementById('project-list');
      if(!list) return;
      list.innerHTML = '';
      PROJECTS.forEach((p, i) => {
        const el = document.createElement('a');
        el.href = `proyecto.html?id=${p.id}`;
        el.className = 'proj-item' + (pid === p.id ? ' active' : '');
        const name = currentLang === 'es' ? p.name_es : p.name_en;
        const tag  = currentLang === 'es' ? p.tag_es  : p.tag_en;
        el.innerHTML = `<div class="proj-num">0${i + 1}</div><div class="proj-info"><div class="proj-title">${name}</div><div class="proj-meta"><span class="proj-year">${p.year}</span><span class="proj-tag-pill">${tag}</span></div></div>`;
        list.appendChild(el);
      });
      document.getElementById('proj-count').textContent = PROJECTS.length;
    }

    if (!proj) {
      document.title = i18n[currentLang].proj_not_found || 'Proyecto no encontrado';
      document.querySelector('.proj-hero').innerHTML = `<a href="index.html" class="back-btn">${i18n[currentLang].proj_back || '← Volver al mapa'}</a><div style="padding:4rem;font-family:var(--mono);color:rgba(240,237,232,0.3)">${i18n[currentLang].proj_not_found || 'Proyecto no encontrado'}</div>`;
    } else {
      let carouselIdx = 0;
      const lang = () => currentLang;

      document.documentElement.style.setProperty('--proj-accent', proj.accent);
      document.documentElement.style.setProperty('--proj-gA', proj.gradA);
      document.documentElement.style.setProperty('--proj-gB', proj.gradB);
      document.title = `${proj.name_es} — Daniel Serra Font`;

      /* Lightbox Logic */
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      
      document.getElementById('proj-hero').addEventListener('click', (e) => {
        if(e.target.closest('button') || e.target.closest('.back-btn') || e.target.closest('.hero-dots')) return;
        lightboxImg.src = `assets/img/${proj.id}-${carouselIdx+1}.webp`;
        lightbox.classList.add('active');
      });
      lightbox.addEventListener('click', () => lightbox.classList.remove('active'));

      function renderHero() {
        document.getElementById('hero-counter').textContent = `0${carouselIdx+1} / 0${proj.images}`;

        const tagEl = document.getElementById('hero-tag');
        tagEl.textContent = lang()==='es' ? proj.tag_es : proj.tag_en;
        tagEl.style.color = proj.accent;

        document.getElementById('hero-title').textContent = lang()==='es' ? proj.name_es : proj.name_en;
        document.getElementById('hero-sub').textContent = lang()==='es' ? proj.subtitle_es : proj.subtitle_en;

        const imgPath = `assets/img/${proj.id}-${carouselIdx+1}.webp`;
        const hero = document.getElementById('proj-hero');
        const img = new Image();
        img.onload = () => { hero.style.backgroundImage = `url(${imgPath})`; hero.style.backgroundSize = 'contain'; hero.style.backgroundPosition = 'center'; hero.style.backgroundRepeat = 'no-repeat'; };
        img.onerror = () => { hero.style.backgroundImage = 'none'; };
        img.src = imgPath;

        const dotsEl = document.getElementById('hero-dots');
        dotsEl.innerHTML = '';
        for (let i = 0; i < proj.images; i++) {
          const d = document.createElement('div');
          d.className = 'hero-dot' + (i === carouselIdx ? ' active' : '');
          d.addEventListener('click', (e) => { e.stopPropagation(); carouselIdx = i; renderHero(); });
          dotsEl.appendChild(d);
        }
      }
      renderHero();

      document.getElementById('hero-prev').addEventListener('click', (e) => { e.stopPropagation(); carouselIdx = (carouselIdx-1+proj.images)%proj.images; renderHero(); });
      document.getElementById('hero-next').addEventListener('click', (e) => { e.stopPropagation(); carouselIdx = (carouselIdx+1)%proj.images; renderHero(); });

      function renderContent() {
        const l = lang();
        const dict = i18n[l];

        document.getElementById('proj-meta').innerHTML = `
          <div class="proj-meta-item"><div class="proj-meta-lbl">${dict.proj_year}</div><div class="proj-meta-val">${proj.year}</div></div>
          <div class="proj-meta-item"><div class="proj-meta-lbl">${dict.proj_client}</div><div class="proj-meta-val">${l==='es'?proj.client_es:proj.client_en}</div></div>
          <div class="proj-meta-item"><div class="proj-meta-lbl">${dict.proj_role}</div><div class="proj-meta-val">${l==='es'?proj.role_es:proj.role_en}</div></div>
          <div class="proj-meta-item"><div class="proj-meta-lbl">${dict.proj_territory}</div><div class="proj-meta-val accent">${l==='es'?proj.area_es:proj.area_en}</div></div>`;

        const desc = l==='es' ? (proj.desc_full_es || proj.desc_es) : (proj.desc_full_en || proj.desc_en);
        document.getElementById('proj-desc').innerHTML = desc.split('\n\n').map(para => `<p>${para}</p>`).join('');

        const led = l==='es' ? proj.led_es : proj.led_en;
        const part = l==='es' ? proj.part_es : proj.part_en;
        document.getElementById('proj-tasks').innerHTML = `
          <div><div class="task-col-title" style="color:${proj.accent}">${dict.proj_tasks_led}</div>
            ${led.map(t => `<div class="proj-task-item"><div class="proj-task-dot" style="background:${proj.accent}"></div><span>${t}</span></div>`).join('')}
          </div>
          <div><div class="task-col-title" style="color:var(--text-3)">${dict.proj_participation}</div>
            ${part.map(t => `<div class="proj-task-item"><div class="proj-task-dot" style="background:var(--border-l)"></div><span>${t}</span></div>`).join('')}
          </div>`;

        const pressEl = document.getElementById('proj-press');
        if (proj.press && proj.press.length > 0) {
          pressEl.innerHTML = `<div class="press-section-title">${dict.proj_press}</div>
            ${proj.press.map(art => `<a href="${art.url}" target="_blank" rel="noopener" class="press-link-row"><div class="press-link-date">${art.date}</div><div class="press-link-body"><div class="press-link-source">${art.source}</div><div class="press-link-title">${art.title}</div></div><div class="press-link-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg></div></a>`).join('')}`;
        } else { pressEl.innerHTML = ''; }

        let docsHtml = '';
        if (proj.docs && proj.docs.length > 0) {
          docsHtml = proj.docs.map(d => `<a href="${d.url}" target="_blank" rel="noopener" class="btn-ext-lg" style="background:${proj.accent};color:#0b0d0f">${l==='es'?d.name_es:d.name_en} ↗</a>`).join('');
        } else if (proj.link) {
          docsHtml = `<a href="${proj.link}" target="_blank" rel="noopener" class="btn-ext-lg" style="background:${proj.accent};color:#0b0d0f">${dict.proj_source}</a>`;
        }

        document.getElementById('proj-actions').innerHTML = `
          <a href="index.html" class="btn-back-lg">${dict.proj_back}</a>
          ${docsHtml}`;
      } 

      /* Init & lang listener */
      buildList();
      renderContent();
      document.getElementById('btn-back-hero').innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> ${i18n[lang()].proj_back.replace(/^←\s*/, '')}`;

      const _origApply = applyI18n;
      window.applyI18n = function(newLang) {
        _origApply(newLang);
        buildList();
        renderHero();
        renderContent();
        document.getElementById('btn-back-hero').innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> ${i18n[newLang].proj_back.replace(/^←\s*/, '')}`;
      };
    }
  </script>
</body>
</html>
