<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel Serra Font — Urbanista y Planificador Territorial</title>
  <meta name="description" content="Portfolio de Daniel Serra Font. Urbanista y Planificador Territorial especializado en Planes Generales, planeamiento de desarrollo y consultoría técnica.">
  <meta name="author" content="Daniel Serra Font">
  <meta name="keywords" content="Urbanista, Planificador Territorial, Valencia, Urbanismo, Planes Generales, Paisaje, Consultoría Urbanística, Daniel Serra Font">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://daserfondesign-art.github.io/danielserra_urbanplanning/">
  <meta property="og:title" content="Daniel Serra Font — Urbanista y Planificador Territorial">
  <meta property="og:description" content="Especialista en Planeamiento General, Planes Parciales y Consultoría Territorial.">
  <meta property="og:image" content="https://daserfondesign-art.github.io/danielserra_urbanplanning/assets/img/og-image.jpg">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Daniel Serra Font — Urbanista">
  <meta name="twitter:description" content="Urbanista y Planificador Territorial en Valencia.">
  <meta name="twitter:image" content="https://daserfondesign-art.github.io/danielserra_urbanplanning/assets/img/og-image.jpg">

  <link rel="icon" type="image/png" href="assets/img/favicon.png">
  <link rel="apple-touch-icon" href="assets/img/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="nav-root" data-active="index"></div>

  <aside class="sidebar">
    <div class="sb-identity">
      <div class="sb-big-num">01</div>
      <div class="sb-name" data-i18n-html="sb_name_index"><em>Proyectos</em></div>
      <div class="sb-rule"></div>
      <div class="sb-role" data-i18n="sb_role">Planeamiento General · Planes Parciales<br>Consultoría Territorial</div>
      <div class="sb-desc" data-i18n="sb_desc">Proyectos de urbanismo y ordenación territorial.</div>
    </div>
    <div class="sidebar-list-header">
      <span class="sidebar-list-label" data-i18n="nav_projects">Proyectos</span>
      <span class="sidebar-list-count" id="proj-count"></span>
    </div>
    <div class="project-list" id="project-list"></div>
  </aside>

  <div id="map"></div>

  <div class="map-hero" id="map-hero">
    <div class="map-hero-name">Daniel<br><em>Serra Font</em></div>
    <div class="map-hero-rule"></div>
    <div class="map-hero-sub" data-i18n="ph_desc">Urbanista &amp; Planificador Territorial</div>
  </div>

  <div class="map-legend" id="map-legend">
    <div class="legend-hint">
      <div class="legend-dot"></div>
      <span>Clic en un proyecto para explorar</span>
    </div>
  </div>

  <div class="bottom-bar">
    <span>Valencia · España</span>
    <span id="proj-count-bar"></span>
  </div>

  <!-- FIX 2: Mobile project list FAB -->
  <button class="mobile-proj-fab" id="mobile-proj-fab" aria-label="Ver proyectos">
    <svg class="fab-icon-list" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1"/><circle cx="3" cy="12" r="1"/><circle cx="3" cy="18" r="1"/></svg>
    <svg class="fab-icon-close" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    <span id="fab-label">Proyectos</span>
  </button>
  <div class="mobile-proj-panel" id="mobile-proj-panel">
    <div class="mobile-proj-panel-header">
      <span id="mobile-panel-label">Proyectos</span>
      <span id="mobile-panel-count"></span>
    </div>
    <div id="mobile-proj-list"></div>
  </div>

  <div class="lightbox" id="lightbox">
    <img id="lightbox-img" src="" alt="Vista ampliada">
  </div>

  <div class="detail-overlay" id="detail-overlay">
    <div class="detail-nav">
      <button class="btn-back" id="btn-back">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        <span id="btn-back-txt">Volver al mapa</span>
      </button>
      <div class="detail-nav-title" id="det-nav-title"></div>
      <div class="detail-nav-tag" id="det-nav-tag"></div>
    </div>

    <div class="detail-body">
      <div class="detail-main">
        
        <div class="detail-hero zoomable" id="det-hero">
          <div class="detail-hero-bg" id="det-hero-bg" style="position: absolute; inset: 0; z-index: 0;"></div>
          <div class="detail-carousel-ctrl" style="z-index: 10;">
            <button class="carr-btn" id="det-prev">‹</button>
            <div class="carr-dots" id="det-dots"></div>
            <span class="carr-counter" id="det-counter"></span>
            <button class="carr-btn" id="det-next">›</button>
          </div>
        </div>

        <div class="detail-content">
          <div style="margin-bottom: 2.5rem; position: relative; z-index: 2;">
            <div class="detail-hero-kicker" id="det-kicker"></div>
            <h1 class="detail-hero-name" id="det-name" style="font-size: 2.4rem;"></h1>
            <div class="detail-hero-sub" id="det-sub"></div>
          </div>
          <div class="detail-meta-strip" id="det-meta"></div>
          <div class="detail-desc" id="det-desc"></div>
          <div class="detail-sec-lbl" id="det-lbl-led">Tareas lideradas</div>
          <div id="det-tasks" style="margin-bottom:2.5rem"></div>
          <div id="det-press-section" style="display:none">
            <div class="detail-sec-lbl" id="det-lbl-press">Cobertura mediática</div>
            <div id="det-press"></div>
          </div>
          <div class="detail-mobile-actions" id="det-mobile-actions"></div>
        </div>
      </div>

      <div class="detail-sidebar" id="det-sidebar"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    const map = L.map('map', { center: [39.1, -0.35], zoom: 8, zoomControl: false, attributionControl: true });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> · © <a href="https://carto.com/attributions">CARTO</a>', subdomains: 'abcd', maxZoom: 19 }).addTo(map);
    map.setView([40.5, -0.35], 6);
    setTimeout(() => map.flyTo([39.1, -0.35], 8, { animate: true, duration: 2, easeLinearity: 0.3 }), 300);

    let activeId = null;
    let carouselIdx = 0;

    function buildList() {
      const list = document.getElementById('project-list');
      if(!list) return;
      list.innerHTML = '';
      PROJECTS.forEach((p, i) => {
        const el = document.createElement('div');
        el.className = 'proj-item' + (activeId === p.id ? ' active' : '');
        const name = currentLang === 'es' ? p.name_es : p.name_en;
        const tag  = currentLang === 'es' ? p.tag_es  : p.tag_en;
        el.innerHTML = `<div class="proj-num">0${i + 1}</div><div class="proj-info"><div class="proj-title">${name}</div><div class="proj-meta"><span class="proj-year">${p.year}</span><span class="proj-tag-pill">${tag}</span></div></div>`;
        el.addEventListener('click', () => openDetail(p.id));
        list.appendChild(el);
      });
      document.getElementById('proj-count').textContent = PROJECTS.length;
      document.getElementById('proj-count-bar').textContent = `${PROJECTS.length} ${currentLang==='es'?'proyectos':'projects'}`;
      document.getElementById('btn-back-txt').textContent = currentLang === 'es' ? 'Volver al mapa' : 'Back to map';

      /* Mobile project list */
      const mList = document.getElementById('mobile-proj-list');
      if (mList) {
        mList.innerHTML = '';
        PROJECTS.forEach((p, i) => {
          const el = document.createElement('div');
          el.className = 'proj-item' + (activeId === p.id ? ' active' : '');
          const name = currentLang === 'es' ? p.name_es : p.name_en;
          const tag  = currentLang === 'es' ? p.tag_es  : p.tag_en;
          el.innerHTML = `<div class="proj-num">0${i + 1}</div><div class="proj-info"><div class="proj-title">${name}</div><div class="proj-meta"><span class="proj-year">${p.year}</span><span class="proj-tag-pill">${tag}</span></div></div>`;
          el.addEventListener('click', () => { openDetail(p.id); closeMobilePanel(); });
          mList.appendChild(el);
        });
        const panelLabel = document.getElementById('mobile-panel-label');
        const panelCount = document.getElementById('mobile-panel-count');
        if (panelLabel) panelLabel.textContent = currentLang === 'es' ? 'Proyectos' : 'Projects';
        if (panelCount) panelCount.textContent = PROJECTS.length;
      }
      const fabLabel = document.getElementById('fab-label');
      if (fabLabel) fabLabel.textContent = currentLang === 'es' ? 'Proyectos' : 'Projects';
    }

    PROJECTS.forEach(p => {
      const el = document.createElement('div'); el.className = 'mkr';
      el.innerHTML = `<div class="mkr-body"><div class="mkr-dot"></div></div><div class="mkr-lbl">${p.abbr}</div>`;
      const icon = L.divIcon({ className: '', html: el.outerHTML, iconSize: [28, 48], iconAnchor: [14, 14] });
      const marker = L.marker([p.lat, p.lng], { icon }).addTo(map);
      marker.on('click', () => openDetail(p.id));
    });

    function openDetail(id) {
      activeId = id; carouselIdx = 0; buildList(); renderDetail(id);
      document.getElementById('detail-overlay').classList.add('open');
      document.getElementById('map').classList.add('active-project');
      document.getElementById('map-legend').style.opacity = '0';
      const fab = document.getElementById('mobile-proj-fab');
      if (fab) fab.style.display = 'none';
      closeMobilePanel();
      const p = PROJECTS.find(x => x.id === id);
      map.panTo([p.lat, p.lng], { animate: true, duration: 0.6 });
    }
    function closeDetail() {
      activeId = null; document.getElementById('detail-overlay').classList.remove('open');
      document.getElementById('map').classList.remove('active-project');
      document.getElementById('map-legend').style.opacity = '1'; buildList();
      if (window.innerWidth <= 960) {
        const fab = document.getElementById('mobile-proj-fab');
        if (fab) fab.style.display = 'flex';
      }
    }
    function closeMobilePanel() {
      const panel = document.getElementById('mobile-proj-panel');
      const fab = document.getElementById('mobile-proj-fab');
      if (panel) panel.classList.remove('open');
      if (fab) fab.classList.remove('open');
    }
    /* Mobile FAB toggle */
    (function(){
      const fab = document.getElementById('mobile-proj-fab');
      const panel = document.getElementById('mobile-proj-panel');
      if (fab && panel) {
        fab.addEventListener('click', () => {
          const isOpen = panel.classList.contains('open');
          if (isOpen) { closeMobilePanel(); }
          else { panel.classList.add('open'); fab.classList.add('open'); }
        });
      }
    })();

    const heroEl = document.getElementById('det-hero');
    heroEl.onclick = (e) => {
      if(e.target.closest('.detail-carousel-ctrl')) return;
      document.getElementById('lightbox-img').src = `assets/img/${activeId}-${carouselIdx + 1}.webp`;
      document.getElementById('lightbox').classList.add('active');
    };
    document.getElementById('lightbox').onclick = function() { this.classList.remove('active'); };

    function renderDetail(id) {
      const p = PROJECTS.find(x => x.id === id);
      const l = currentLang; const dict = i18n[l];
      const name = l==='es'?p.name_es:p.name_en; const sub = l==='es'?p.subtitle_es:p.subtitle_en;
      const client = l==='es'?p.client_es:p.client_en; const role = l==='es'?p.role_es:p.role_en;
      const area = l==='es'?p.area_es:p.area_en; const tag = l==='es'?p.tag_es:p.tag_en;
      const desc = l==='es' ? (p.desc_short_es || p.desc_es) : (p.desc_short_en || p.desc_en); const led = l==='es'?p.led_es:p.led_en;
      const part = l==='es'?p.part_es:p.part_en;

      document.getElementById('det-nav-title').textContent = name;
      document.getElementById('det-nav-tag').textContent = tag;
      document.getElementById('det-nav-tag').style.color = '#c44b2b';

      const bgEl = document.getElementById('det-hero-bg');
      bgEl.style.backgroundColor = 'transparent';
      bgEl.style.backgroundImage = `url('assets/img/${id}-${carouselIdx + 1}.webp')`;
      bgEl.style.backgroundSize = 'contain';
      bgEl.style.backgroundRepeat = 'no-repeat';
      bgEl.style.backgroundPosition = 'center';

      document.getElementById('det-kicker').textContent = tag;
      document.getElementById('det-name').textContent = name;
      document.getElementById('det-sub').textContent = sub;

      const dotsEl = document.getElementById('det-dots'); dotsEl.innerHTML = '';
      for (let i = 0; i < p.images; i++) {
        const d = document.createElement('div'); d.className = 'carr-dot';
        d.style.width = i === carouselIdx ? '16px' : '5px';
        d.style.background = i === carouselIdx ? '#c44b2b' : 'var(--border-l)';
        d.addEventListener('click', (e) => { e.stopPropagation(); carouselIdx = i; renderDetail(id); });
        dotsEl.appendChild(d);
      }
      document.getElementById('det-counter').textContent = `0${carouselIdx + 1} / 0${p.images}`;

      document.getElementById('det-meta').innerHTML = `
        <div class="dm-item"><div class="dm-lbl">${dict.proj_year}</div><div class="dm-val">${p.year}</div></div>
        <div class="dm-item"><div class="dm-lbl">${dict.proj_client}</div><div class="dm-val">${client}</div></div>
        <div class="dm-item"><div class="dm-lbl">${dict.proj_role}</div><div class="dm-val">${role}</div></div>
        <div class="dm-item"><div class="dm-lbl">${dict.proj_territory}</div><div class="dm-val accent">${area}</div></div>`;

      document.getElementById('det-desc').innerHTML = desc.split('\n\n').map(t => `<p>${t}</p>`).join('');
      document.getElementById('det-lbl-led').textContent = dict.proj_tasks_led;
      document.getElementById('det-tasks').innerHTML = led.map(t => `<div class="d-task"><div class="d-task-dot"></div>${t}</div>`).join('');

      const pressSection = document.getElementById('det-press-section');
      if (p.press && p.press.length > 0) {
        pressSection.style.display = '';
        document.getElementById('det-lbl-press').textContent = dict.proj_press;
        document.getElementById('det-press').innerHTML = p.press.map(pr => `<div class="press-item"><a href="${pr.url}" target="_blank" rel="noopener"><div class="press-src">${pr.source} · ${pr.date}</div><div class="press-ttl">${pr.title}</div></a></div>`).join('');
      } else { pressSection.style.display = 'none'; }

      /* Mobile-only action buttons */
      const mobileActions = document.getElementById('det-mobile-actions');
      if (mobileActions) {
        let docsHtml = '';
        if (p.link) {
          docsHtml += `<a href="${p.link}" target="_blank" rel="noopener" class="btn-ext" style="margin-bottom: 0.5rem;">${dict.proj_source}</a>`;
        }
        mobileActions.innerHTML = `
          <a href="proyecto.html?id=${id}" class="btn-full" style="margin-bottom: 0.5rem;">Expediente completo <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg></a>
          ${docsHtml}`;
      }

      document.getElementById('det-sidebar').innerHTML = `
        <div><div class="ds-label">Ficha del proyecto</div>
          <div class="ds-row"><div class="ds-row-lbl">Municipio</div><div class="ds-row-val">${sub}</div></div>
          <div class="ds-row"><div class="ds-row-lbl">Período</div><div class="ds-row-val">${p.year}</div></div>
          <div class="ds-row"><div class="ds-row-lbl">Cliente</div><div class="ds-row-val">${client}</div></div>
          <div class="ds-row"><div class="ds-row-lbl">Rol</div><div class="ds-row-val">${role}</div></div>
          <div class="ds-row"><div class="ds-row-lbl">Ámbito</div><div class="ds-row-val" style="color:var(--red)">${area}</div></div>
          <div class="ds-row"><div class="ds-row-lbl">Tipo</div><div class="ds-row-val" style="color:var(--red)">${tag}</div></div>
        </div>
        ${part && part.length ? `<div><div class="ds-label">${dict.proj_participation}</div>${part.map(t => `<div class="ds-part-item"><div class="ds-part-dot"></div>${t}</div>`).join('')}</div>` : ''}
        <div style="margin-top:auto">
          <a href="proyecto.html?id=${id}" class="btn-full">Expediente completo <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg></a>
          ${p.link ? `<a href="${p.link}" target="_blank" rel="noopener" class="btn-ext" style="margin-top: 0.5rem;">${dict.proj_source}</a>` : ''}
        </div>`;
    }

    document.getElementById('det-prev').addEventListener('click', (e) => { e.stopPropagation(); if(activeId){ const p = PROJECTS.find(x=>x.id===activeId); carouselIdx = (carouselIdx-1+p.images)%p.images; renderDetail(activeId); } });
    document.getElementById('det-next').addEventListener('click', (e) => { e.stopPropagation(); if(activeId){ const p = PROJECTS.find(x=>x.id===activeId); carouselIdx = (carouselIdx+1)%p.images; renderDetail(activeId); } });

    document.getElementById('btn-back').addEventListener('click', closeDetail);
    map.on('click', () => { if (document.getElementById('detail-overlay').classList.contains('open')) closeDetail(); });

    document.addEventListener('DOMContentLoaded', buildList);
    const _origApply = applyI18n;
    window.applyI18n = function(lang) { _origApply(lang); buildList(); if (activeId) renderDetail(activeId); };
  </script>
<script src="js/analytics.js"></script>
</body>
</html>
